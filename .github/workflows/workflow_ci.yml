name: CI - Model Training & Docker Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    env:
      MLFLOW_ALLOW_FILE_STORE: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install Dependencies
        run: |
          pip install mlflow==3.13.0 pandas scikit-learn matplotlib seaborn

      - name: Train Model with MLflow
        run: |
          cd MLProject
          export MLFLOW_TRACKING_URI=sqlite:///mlflow.db
          mlflow run . --experiment-name="heart-failure-modelling" --env-manager=local

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns/
            MLProject/mlflow.db

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build Docker Image using MLflow
        run: |
          MODEL_PATH=$(cat MLProject/model_path.txt)
          mlflow models build-docker -m "MLProject/$MODEL_PATH" -n "${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci:latest" --env-manager=local

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci:latest
